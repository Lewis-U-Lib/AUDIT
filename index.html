<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lewis University Library AI Usage Decision Tree (AUDIT)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #940731;
    --surface:      #7f062b;
    --surface2:     #5f0420;
    --surface-card: #7a0628;
    --border:       rgba(255,200,210,0.12);
    --crimson:      #940731;
    --crimson-mid:  #7f062b;
    --crimson-dark: #4f031a;
    --crimson-light:#ab1846;
    --crimson-glow: rgba(148,7,49,0.28);
    --gold:         #f0c84e;
    --gold-light:   #f8dd82;
    --gold-dim:     rgba(240,200,78,0.2);
    --text:         #fff5f7;
    --text-muted:   rgba(255,235,240,0.72);
    --text-dim:     rgba(255,220,230,0.4);
    --green:        #2e9e6a;
    --green-glow:   rgba(46,158,106,0.25);
    --amber:        #e09030;
    --amber-glow:   rgba(224,144,48,0.22);
    --radius:       10px;
    --radius-lg:    16px;
    --transition:   0.3s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--surface2) 0%, #430214 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 32px rgba(0,0,0,0.5);
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    height: 68px;
  }
  .header-logo {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--crimson), var(--crimson-mid));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }
  .header-titles { flex: 1; }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: 0.01em;
  }
  .header-sub {
    font-size: 0.72rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .header-badge {
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-light);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* ── PROGRESS BAR ── */
  #progress-bar-wrap {
    height: 3px;
    background: var(--surface2);
    position: relative;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--crimson), var(--gold));
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ── MAIN LAYOUT ── */
  main {
    flex: 1;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── STEP TRACKER ── */
  #step-tracker {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .tracker-step {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 6px 14px 6px 8px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: 1px solid rgba(255,200,210,0.18);
    color: rgba(255,235,240,0.45);
    background: rgba(0,0,0,0.2);
    transition: var(--transition);
  }
  .tracker-step.active {
    border-color: var(--gold);
    color: var(--gold-light);
    background: var(--gold-dim);
  }
  .tracker-step.done {
    border-color: rgba(46,139,94,0.4);
    color: #6ecfa0;
    background: rgba(46,139,94,0.1);
  }
  .tracker-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .tracker-sep {
    color: var(--text-dim);
    font-size: 0.7rem;
  }

  /* ── BREADCRUMB / HISTORY ── */
  #history-trail {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-bottom: 1.5rem;
    min-height: 28px;
  }
  .crumb {
    font-size: 0.7rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }
  .crumb-text {
    max-width: 180px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,200,210,0.12);
    border-radius: 4px;
    padding: 2px 7px;
  }
  .crumb-arrow { color: var(--text-dim); }

  /* ── CARD ── */
  .card {
    background: var(--surface-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem 2.25rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    animation: cardIn 0.35s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-color, var(--gold)), transparent);
    opacity: 0.7;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── STEP BADGE ── */
  .step-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--gold-light);
  }

  /* ── INSTRUCTION CONTEXT ── */
  .card-context {
    font-size: 0.82rem;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 0.85rem;
    padding-bottom: 0.85rem;
    border-bottom: 1px solid var(--border);
    line-height: 1.5;
  }
  .card-instruction {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
    line-height: 1.55;
    background: rgba(0,0,0,0.2);
    border-left: 3px solid var(--gold);
    padding: 0.7rem 1rem;
    border-radius: 0 6px 6px 0;
  }

  /* ── QUESTION ── */
  .card-question {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 1.75rem;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 0.6rem; }
  .option-btn {
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,200,210,0.15);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 400;
    line-height: 1.45;
    cursor: pointer;
    text-align: left;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 0.85rem;
    position: relative;
    overflow: hidden;
  }
  .option-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .option-btn:hover {
    background: rgba(0,0,0,0.35);
    border-color: var(--gold);
    color: var(--text);
    transform: translateX(4px);
  }
  .option-btn:hover::after { opacity: 1; }
  .option-btn:active { transform: translateX(2px); }
  .option-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--gold-dim);
    border: 1px solid rgba(240,200,78,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--gold-light);
    transition: var(--transition);
  }
  .option-btn:hover .option-icon {
    background: rgba(240,200,78,0.25);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* ── PAUSE CARD ── */
  .card.pause-card {
    --accent-color: var(--amber);
    border-color: rgba(224,144,48,0.3);
    background: linear-gradient(135deg, #7a2a00, #5a1f00);
  }
  .pause-icon-wrap {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--amber-glow);
    border: 1px solid rgba(224,144,48,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 1.25rem;
  }
  .pause-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: #f0b060;
    margin-bottom: 0.5rem;
  }
  .pause-msg {
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  /* ── STOP CARD ── */
  .card.stop-card {
    --accent-color: var(--crimson-mid);
    border-color: rgba(255,180,180,0.2);
    background: linear-gradient(135deg, #3a0010, #25010c);
  }
  .stop-icon-wrap {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--crimson-glow);
    border: 1px solid rgba(140,26,54,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 1.25rem;
  }
  .stop-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--gold-light);
    margin-bottom: 0.5rem;
  }
  .stop-msg {
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  /* ── SUCCESS CARD ── */
  .card.success-card {
    --accent-color: var(--green);
    border-color: rgba(46,158,106,0.35);
    background: linear-gradient(135deg, #0c3020, #071a10);
  }
  .success-icon-wrap {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--green-glow);
    border: 1px solid rgba(46,139,94,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 1.25rem;
  }
  .success-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: #6ecfa0;
    margin-bottom: 0.5rem;
  }
  .success-msg {
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  /* ── ACTION CARD ── */
  .card.action-card {
    --accent-color: var(--gold);
    border-color: rgba(240,200,78,0.25);
    background: linear-gradient(135deg, #3a2a00, #241a00);
  }
  .action-icon-wrap {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 1.25rem;
  }
  .action-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--gold-light);
    margin-bottom: 0.5rem;
  }
  .action-msg {
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  /* ── RESOURCE BOX ── */
  .resource-box {
    background: rgba(0,0,0,0.22);
    border: 1px solid rgba(255,200,210,0.12);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }
  .resource-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
  .resource-content { flex: 1; }
  .resource-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }
  .resource-text {
    font-size: 0.82rem;
    line-height: 1.55;
    color: var(--text-muted);
  }
  .resource-text a { color: var(--gold-light); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 1.4rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    border: none;
    letter-spacing: 0.02em;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--crimson), var(--crimson-mid));
    color: #dde6f4;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #7f062b, #5f0420);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px var(--crimson-glow);
  }
  .btn-gold {
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.35);
    color: var(--gold-light);
  }
  .btn-gold:hover {
    background: rgba(201,168,76,0.28);
    border-color: var(--gold);
    transform: translateY(-1px);
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
  }
  .btn-green {
    background: var(--green-glow);
    border: 1px solid rgba(46,139,94,0.4);
    color: #6ecfa0;
  }
  .btn-green:hover {
    background: rgba(46,139,94,0.3);
    border-color: var(--green);
    transform: translateY(-1px);
  }

  .btn-row {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  /* ── BACK BUTTON ── */
  #back-btn {
    margin-bottom: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #back-btn.visible { opacity: 1; pointer-events: auto; }

  /* ── RESOURCE PANEL ── */
  #resource-panel {
    position: fixed;
    top: 0; right: 0;
    width: 380px;
    height: 100vh;
    background: #1a0a0e;
    border-left: 1px solid rgba(255,200,210,0.12);
    box-shadow: -8px 0 40px rgba(0,0,0,0.5);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #resource-panel.open { transform: translateX(0); }
  .panel-header {
    padding: 1.5rem;
    border-bottom: 1px solid rgba(255,200,210,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #250c12;
  }
  .panel-header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--gold-light);
  }
  .panel-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 30px; height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }
  .panel-close:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
  }
  .panel-body::-webkit-scrollbar { width: 5px; }
  .panel-body::-webkit-scrollbar-track { background: var(--surface2); }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .resource-section { margin-bottom: 1.75rem; }
  .resource-section-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gold);
    margin-bottom: 0.6rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .resource-section p {
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
  }
  .resource-section ul {
    list-style: none;
    padding: 0;
  }
  .resource-section li {
    font-size: 0.82rem;
    line-height: 1.55;
    color: var(--text-muted);
    padding: 4px 0 4px 14px;
    position: relative;
  }
  .resource-section li::before {
    content: '◆';
    font-size: 0.4rem;
    color: var(--gold);
    position: absolute;
    left: 0;
    top: 8px;
  }

  /* ── OVERLAY ── */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #overlay.visible { opacity: 1; pointer-events: auto; }

  /* ── RESOURCES TRIGGER BUTTON ── */
  .resource-trigger {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.75rem;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 20px;
    padding: 3px 10px;
    cursor: pointer;
    transition: var(--transition);
    margin-bottom: 1rem;
  }
  .resource-trigger:hover {
    background: rgba(201,168,76,0.28);
    border-color: rgba(201,168,76,0.5);
  }

  /* ── FOOTER ── */
  footer {
    background: var(--surface2);
    border-top: 1px solid rgba(255,200,210,0.12);
    padding: 1rem 2rem;
    text-align: center;
    font-size: 0.72rem;
    color: rgba(255,235,240,0.4);
  }
  footer strong { color: rgba(255,235,240,0.6); }
  footer a { color: rgba(255,235,240,0.78); text-decoration: underline; }

  /* ── START SPLASH ── */
  .splash-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .splash-eyebrow {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--gold);
    margin-bottom: 0.6rem;
  }
  .splash-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.9rem;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }
  .splash-sub {
    font-size: 0.88rem;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 560px;
    margin: 0 auto;
  }
  .splash-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 1.75rem 0;
  }
  .before-you-begin {
    font-size: 0.83rem;
    color: var(--text-muted);
    line-height: 1.65;
    background: rgba(0,0,0,0.22);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    border: 1px solid rgba(255,200,210,0.12);
    border-left: 3px solid var(--gold);
    margin-bottom: 1.5rem;
  }
  .before-you-begin strong { color: var(--gold-light); font-weight: 600; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    main { padding: 1.25rem 1rem 3rem; }
    .card { padding: 1.5rem; }
    #resource-panel { width: 100%; }
    .splash-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-logo">⚖️</div>
    <div class="header-titles">
      <div class="header-sub">Lewis University Library · AI Usage Decision Tree</div>
      <div class="header-title">Lewis University Library AI Usage Decision Tree (AUDIT)</div>
    </div>
    <div class="header-badge">v1.0</div>
  </div>
</header>

<main>

    instruction: 'Attempt to anticipate future risk. Consider the various ways things could go wrong, legally, ethically, and morally. Research analogous situations where automated decision making has failed.',

    question: 'What are the possible disparate impacts of your tool\'s application? Have you developed context-specific safeguards that address stakeholder concerns, paying particular attention to vulnerable populations?',
    options: [
      { label: 'Unsure — safeguards not yet fully developed', next: 'pause_disparate' },
      { label: 'Safeguards are in place to address all stakeholder concerns', next: 'step4_emergency' },
    ]
  },

  pause_disparate: {
    id: 'pause_disparate', type: 'pause',
    title: 'Pause — Disparate Impacts Not Addressed',
    message: 'Work with stakeholders to understand the full impact of your tool\'s application. Develop context-specific safeguards for all risks before proceeding.',
    resourceKey: 'disparate_impacts',
    returnTo: 'step4_application'
  },

  step4_emergency: {
    id: 'step4_emergency',
    step: 'Step 4',
    stepNum: 4,
    type: 'question',
    resourceKey: 'fundamental_rights',
    question: 'Could the application involve emergency limitations on fundamental rights?',
    options: [
      { label: 'After extensive collaboration with stakeholders, we concluded that no emergency limitations are possible in any foreseeable scenario', next: 'step4_final' },

    ]
  },

  step4_necessary: {
    id: 'step4_necessary',
    step: 'Step 4',
    stepNum: 4,
    type: 'question',
    question: 'Are these limitations necessary? Can the goal be reached in another way?',
    options: [
      { label: 'There are other options — the goal can be reached without these limitations', next: 'pause_modify' },
      { label: 'The limitations cannot be avoided', next: 'step4_consent' },
    ]
  },

  pause_modify: {
    id: 'pause_modify', type: 'pause',
    title: 'Pause — Work with Stakeholders',
    message: 'Work with stakeholders to adjust strategy to modify or eliminate limitations to fundamental rights before proceeding.',
    resourceKey: 'fundamental_rights',
    returnTo: 'step4_necessary'
  },

  step4_consent: {
    id: 'step4_consent',
    step: 'Step 4',
    stepNum: 4,
    type: 'question',
    question: 'Are stakeholders aware of and consenting to these limitations?',
    options: [
      { label: 'Stakeholders are not aware / do not consent', next: 'pause_modify' },
      { label: 'Stakeholders are aware of and consenting to these limitations', next: 'step4_proportionate' },
    ]
  },

  step4_proportionate: {
    id: 'step4_proportionate',
    step: 'Step 4',
    stepNum: 4,
    type: 'question',
    question: 'Are these limitations proportionate to the risk?',
    options: [
      { label: 'Limitations are disproportionate', next: 'pause_modify' },
      { label: 'Limitations are proportionate', next: 'step4_time_bounded' },
    ]
  },

  step4_time_bounded: {
    id: 'step4_time_bounded',
    step: 'Step 4',
    stepNum: 4,
    type: 'question',
    question: 'Can these limitations be constrained to the shortest possible time frame? Is that time frame bounded (i.e., not open-ended)?',
    options: [
      { label: 'Limitations are unconstrained / time frame is open-ended', next: 'pause_modify' },
      { label: 'Limitations can be constrained in time with a bounded time frame', next: 'step4_oversight' },
    ]
  },

  step4_oversight: {
    id: 'step4_oversight',
    step: 'Step 4',
    stepNum: 4,
    type: 'question',
    resourceKey: 'post_deployment',
    question: 'Are oversight mechanisms in place to govern these limitations? Do stakeholders have a voice in these mechanisms?',
    options: [
      { label: 'There are no oversight mechanisms / stakeholders have no oversight', next: 'pause_modify' },
      { label: 'Stakeholders have oversight and oversight mechanisms are in place', next: 'step4_final' },
    ]
  },

  step4_final: {
    id: 'step4_final',
    step: 'Step 4',
    stepNum: 4,
    type: 'question',
    question: 'In light of all the above steps, do the benefits of this application likely outweigh the risks?',
    options: [
      { label: 'No — the risks outweigh the benefits', next: 'consider_other' },
      { label: 'Yes — the benefits likely outweigh the risks', next: 'move_forward' },
    ]
  },

  // ── TERMINAL NODES ─────────────────────────
  consider_other: {
    id: 'consider_other',
    type: 'terminal_stop',
    title: 'Consider Other Solutions',

  },

  move_forward: {
    id: 'move_forward',
    type: 'terminal_success',
    title: 'Move Forward with Implementation',
    message: 'Move forward with implementation. Regularly monitor outcomes post-deployment to meet effectiveness, compliance, and equity goals. Note that post-deployment guidance is beyond the scope of this decision tree. However, monitoring and auditing is crucial to mitigating unintended harms in the future. See Post-Deployment Resources for preliminary guidance.',
    resourceKey: 'post_deployment'
  }
};

// ─────────────────────────────────────────────
// STEP TRACKER CONFIG
// ─────────────────────────────────────────────
const STEPS = [
  { id: 'start', label: 'Start' },
  { id: '1', label: 'Step 1: Solutions' },
  { id: '2', label: 'Step 2: Training Data' },
  { id: '3', label: 'Step 3: Tool Testing' },
  { id: '4', label: 'Step 4: Application' },
];

// ─────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────
function render() {
  const node = NODES[state.current];
  if (!node) return;

  updateTracker(node);
  updateProgress(node);
  updateBackBtn();
  updateHistory();

  const content = document.getElementById('content');
  content.innerHTML = '';

  switch (node.type) {
    case 'splash':    content.appendChild(renderSplash()); break;
    case 'question':  content.appendChild(renderQuestion(node)); break;
    case 'pause':     content.appendChild(renderPause(node)); break;
    case 'return':    content.appendChild(renderReturn(node)); break;
    case 'action':    content.appendChild(renderAction(node)); break;
    case 'terminal_stop':    content.appendChild(renderStop(node)); break;
    case 'terminal_success': content.appendChild(renderSuccess(node)); break;
  }
}

function renderSplash() {
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="splash-header">
      <div class="splash-eyebrow">Lewis University Library · AUDIT</div>
      <div class="splash-title">Lewis University Library<br>AI Usage Decision Tree (AUDIT)</div>
      <div class="splash-sub">A structured framework to assist you and your organization in deciding whether to develop or deploy AI solutions responsibly.</div>
    </div>
    <div class="card">
      <div class="before-you-begin">
        <strong>Before You Begin:</strong> This decision tree is intended to be a guide that assists the user and their organization to structure the decision-making process on whether to develop or deploy AI solutions. Users should recognize that the model, while designed to be generally applicable, will not capture the nuances of every possible scenario. In any particular context, the answers may be difficult to judge, and despite the binary nature of the decision nodes, many questions may not have clear yes/no answers in real life. In such cases, <strong>collect as much information as possible, and use caution if deciding to proceed.</strong>
        <br><br>
        Inclusive stakeholder engagement is central to this framework. Before applying the tree, consider who in your organization — or outside of it — would be best qualified to answer these questions. Always consider whether those providing responses are trustworthy, independent, and competent to do so.
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem;">
        <button class="resource-trigger" onclick="openPanel('stakeholder_engagement')">📋 Stakeholder Engagement Guide</button>
        <button class="resource-trigger" onclick="openPanel('ai_risk')">⚠️ AI Risk Management Resources</button>
        <button class="resource-trigger" onclick="openPanel('fundamental_rights')">⚖️ Fundamental Rights</button>
      </div>
      <div class="splash-divider"></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;">
        <div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:0.25rem;">Ready to begin?</div>
        <button class="btn btn-primary" style="font-size:1rem;padding:0.85rem 2.5rem;" onclick="navigate('stakeholder_q')">
          Start the Decision Tree →
        </button>
      </div>
    </div>
  `;
  return div;
}

function renderQuestion(node) {
  const div = document.createElement('div');
  div.className = 'card';

  let html = '';

  if (node.step) {
    html += `<div class="step-badge">`;
    if (node.stepNum) html += `<div class="step-num">${node.stepNum}</div>`;
    html += `${node.step}</div>`;
  }

  if (node.resourceKey) {
    html += `<button class="resource-trigger" onclick="openPanel('${node.resourceKey}')">📚 View Resource: ${RESOURCES[node.resourceKey].title}</button>`;
  }

  if (node.context) {
    html += `<div class="card-context">${node.context}</div>`;
  }

  if (node.instruction) {
    html += `<div class="card-instruction">${node.instruction}</div>`;
  }

  html += `<div class="card-question">${node.question}</div>`;

  html += `<div class="options">`;
  node.options.forEach((opt, i) => {
    html += `<button class="option-btn" onclick="selectOption(${i}, '${node.id}')">
      <div class="option-icon">${String.fromCharCode(65+i)}</div>
      <div>${opt.label}</div>
    </button>`;
  });
  html += `</div>`;

  div.innerHTML = html;
  return div;
}

function renderPause(node) {
  const div = document.createElement('div');
  div.className = 'card pause-card';

  let html = `
    <div class="pause-icon-wrap">⏸️</div>
    <div class="pause-title">${node.title}</div>
    <div class="pause-msg">${node.message}</div>
  `;

  if (node.resourceKey) {
    html += `<button class="resource-trigger" onclick="openPanel('${node.resourceKey}')">📚 View Resource: ${RESOURCES[node.resourceKey].title}</button>`;
  }

  html += `<div class="btn-row">`;
  if (node.returnTo) {
    html += `<button class="btn btn-gold" onclick="navigate('${node.returnTo}')">← Address this issue & continue</button>`;
  }
  html += `<button class="btn btn-ghost" onclick="navigate('start')">↩ Restart</button>`;
  html += `</div>`;

  div.innerHTML = html;
  return div;
}

function renderReturn(node) {
  const div = document.createElement('div');
  div.className = 'card pause-card';

  div.innerHTML = `
    <div class="pause-icon-wrap">↩️</div>
    <div class="pause-title">${node.title}</div>
    <div class="pause-msg">${node.message}</div>
    <div class="btn-row">
      <button class="btn btn-gold" onclick="navigate('${node.returnTo}')">← Return to Step 1</button>
      <button class="btn btn-ghost" onclick="navigate('start')">↩ Restart</button>
    </div>
  `;
  return div;
}

function renderAction(node) {
  const div = document.createElement('div');
  div.className = 'card action-card';

  const nextNode = node.nextFn ? node.nextFn() : node.next;

  div.innerHTML = `
    <div class="action-icon-wrap">📋</div>
    <div class="step-badge"><div class="step-num">${node.stepNum}</div>${node.step}</div>
    <div class="action-title">${node.title}</div>
    <div class="action-msg">${node.message}</div>
    <button class="btn btn-primary" onclick="navigate('${nextNode}')">Continue to Step 3 →</button>
  `;
  return div;
}

function renderStop(node) {
  const div = document.createElement('div');
  div.className = 'card stop-card';

  div.innerHTML = `
    <div class="stop-icon-wrap">🛑</div>
    <div class="stop-title">${node.title}</div>
    <div class="stop-msg">${node.message}</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="navigate('step1_consider')">↩ Return to Step 1</button>
      <button class="btn btn-ghost" onclick="navigate('start')">↩ Restart from Beginning</button>
    </div>
  `;
  return div;
}

function renderSuccess(node) {
  const div = document.createElement('div');
  div.className = 'card success-card';

  let html = `
    <div class="success-icon-wrap">✅</div>
    <div class="success-title">${node.title}</div>
    <div class="success-msg">${node.message}</div>
  `;

  if (node.resourceKey) {
    html += `<button class="resource-trigger" onclick="openPanel('${node.resourceKey}')" style="margin-bottom:1rem;">📚 View Post-Deployment Resources</button>`;
  }

  html += `<div class="btn-row">
    <button class="btn btn-green">✓ Document Your Decision</button>
    <button class="btn btn-ghost" onclick="navigate('start')">↩ Start New Assessment</button>
  </div>`;

  div.innerHTML = html;
  return div;
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function navigate(nodeId) {
  if (state.current !== nodeId) {
    state.history.push(state.current);
  }
  state.current = nodeId;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectOption(index, nodeId) {
  const node = NODES[nodeId];
  const opt = node.options[index];
  if (opt.onSelect) opt.onSelect();
  navigate(opt.next);
}

function goBack() {
  if (state.history.length > 0) {
    state.current = state.history.pop();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────
function updateTracker(node) {
  const tracker = document.getElementById('step-tracker');
  const stepNum = node.stepNum;

  const steps = [
    { num: null, label: 'Start' },
    { num: 1, label: 'Solutions' },
    { num: 2, label: 'Training Data' },
    { num: 3, label: 'Tool Testing' },
    { num: 4, label: 'Application' },
  ];

  tracker.innerHTML = steps.map((s, i) => {
    let cls = 'tracker-step';
    if (s.num === stepNum || (s.num === null && node.id === 'stakeholder_q')) cls += ' active';
    else if (s.num !== null && stepNum !== null && s.num < stepNum) cls += ' done';
    return `<div class="${cls}"><div class="tracker-dot"></div>${s.num ? `Step ${s.num}: ` : ''}${s.label}</div>${i < steps.length-1 ? '<div class="tracker-sep">›</div>' : ''}`;
  }).join('');
}

function updateProgress(node) {
  const progressMap = {
    start: 0, stakeholder_q: 3, pause_stakeholder: 5,
    step1_consider: 10, return_step1: 10, tool_exists: 15,
    new_training_data_q: 18, existing_training_data_q: 18,
    step2a_representativeness: 25, step2a_ethics: 30, step2a_privacy: 33,
    step2a_verifiable: 36, step2a_temporal: 39,
    step2b_applicable: 25, step2b_ethics: 30, step2b_privacy: 33,
    step2b_verifiable: 36, step2b_temporal: 39,
    step2_review_action: 42,
    step3_new: 50, step3_new_test_safeguards: 54, step3_new_test_rights: 57,
    step3_proceed_action: 60,
    step3_existing: 50, step3_existing_test_safeguards: 54, step3_existing_test_rights: 57,
    step3_scrutinize: 63, step3_anomalous: 66,
    step4_application: 72, step4_emergency: 76, step4_necessary: 79,
    step4_consent: 81, step4_proportionate: 84, step4_time_bounded: 87,
    step4_oversight: 90, step4_final: 95,
    consider_other: 100, move_forward: 100,
  };
  const pct = progressMap[node.id] || 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updateBackBtn() {
  const btn = document.getElementById('back-btn');
  if (state.history.length > 0 && state.current !== 'start') {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
}

function updateHistory() {
  const trail = document.getElementById('history-trail');
  if (state.history.length === 0) { trail.innerHTML = ''; return; }

  const labels = {
    start: 'Start',
    stakeholder_q: 'Stakeholders',
    step1_consider: 'Step 1',
    tool_exists: 'Tool Exists?',
    new_training_data_q: 'Training Data?',
    existing_training_data_q: 'Training Data?',
    step2a_representativeness: 'Step 2 — New',
    step2b_applicable: 'Step 2 — Existing',
    step2_review_action: 'Step 2 Complete',
    step3_new: 'Step 3 — New',
    step3_existing: 'Step 3 — Existing',
    step3_scrutinize: 'Test Results',
    step4_application: 'Step 4',
    step4_emergency: 'Emergency Limitations?',
    step4_final: 'Final Assessment',
  };

  const shown = state.history.slice(-4);
  trail.innerHTML = shown.map((id, i) => {
    const label = labels[id] || id.replace(/_/g,' ');
    return `<div class="crumb">${i > 0 ? '<span class="crumb-arrow">›</span>' : ''}<span class="crumb-text" title="${label}">${label}</span></div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// RESOURCE PANEL
// ─────────────────────────────────────────────
function openPanel(key) {
  const res = RESOURCES[key];
  if (!res) return;
  document.getElementById('panel-title').textContent = res.title;
  document.getElementById('panel-body').innerHTML = res.content;
  document.getElementById('resource-panel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closePanel() {
  document.getElementById('resource-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
render();
</script>
</body>
</html>
